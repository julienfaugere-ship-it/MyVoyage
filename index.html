<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyVoyage ✈️</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean:#1a6b8a;--ocean-light:#2a8fba;--sand:#f5e6c8;--coral:#e86b4a;
    --coral-light:#f08060;--sun:#f5c842;--sky:#e8f4f8;--deep:#0d3d52;
    --white:#fdfcf8;--text:#1a2e38;--text-light:#5a7a88;--green:#4a9b6f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);min-height:100vh;}

  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--deep);color:white;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #sync-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--sun);z-index:9998;transform:scaleX(0);transform-origin:left;transition:transform .4s ease,opacity .3s;}
  #sync-bar.syncing{transform:scaleX(0.7);opacity:1;}
  #sync-bar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .5s .2s;}

  header{background:linear-gradient(135deg,var(--deep) 0%,var(--ocean) 60%,var(--ocean-light) 100%);position:relative;overflow:hidden;}
  header::before{content:'';position:absolute;bottom:-2px;left:0;right:0;height:60px;background:var(--white);clip-path:ellipse(55% 100% at 50% 100%);}
  .header-inner{padding:24px 20px 60px;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .logo{font-family:'Playfair Display',serif;color:var(--white);font-size:clamp(22px,5vw,32px);}
  .logo span{color:var(--sun);font-style:italic;}
  .firebase-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px;}
  .firebase-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;animation:pulse 2s infinite;}
  .firebase-dot.offline{background:#f44336;animation:none;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .header-waves{position:absolute;bottom:0;left:0;right:0;opacity:.15;font-size:48px;letter-spacing:-8px;pointer-events:none;line-height:1;}

  .app{max-width:900px;margin:0 auto;padding:0 16px 80px;}
  .view{display:none;}.view.active{display:block;}

  .section-title{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,28px);color:var(--deep);margin:28px 0 16px;}
  .section-title em{color:var(--coral);font-style:italic;}
  .trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
  .trip-card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(26,107,138,.12);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid rgba(26,107,138,.08);}
  .trip-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(26,107,138,.2);}
  .trip-card-banner{height:90px;display:flex;align-items:center;justify-content:center;font-size:42px;}
  .trip-card-body{padding:14px 16px 16px;}
  .trip-card-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--deep);margin-bottom:4px;}
  .trip-card-dates{font-size:12px;color:var(--text-light);margin-bottom:10px;}
  .trip-card-stats{display:flex;gap:12px;flex-wrap:wrap;}
  .stat-pill{background:var(--sky);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--ocean);}
  .stat-pill.ok{background:#e8f5e9;color:#2e7d32;}
  .stat-pill.over{background:#fde8e8;color:#c0392b;}

  .btn-add-trip{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--coral),var(--coral-light));color:white;border:none;border-radius:16px;padding:14px 22px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(232,107,74,.35);margin:8px 0 24px;}
  .btn-add-trip:hover{transform:translateY(-2px);}

  .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--ocean);background:none;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;padding:0;margin:20px 0 4px;}
  .trip-hero{background:linear-gradient(135deg,var(--deep),var(--ocean));border-radius:20px;padding:24px 20px;color:white;margin-bottom:20px;position:relative;overflow:hidden;}
  .trip-hero::after{content:attr(data-emoji);position:absolute;right:16px;bottom:-10px;font-size:80px;opacity:.15;pointer-events:none;}
  .trip-hero-name{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,32px);margin-bottom:6px;}
  .trip-hero-dates{opacity:.8;font-size:14px;margin-bottom:16px;}
  .budget-bar-label{display:flex;justify-content:space-between;font-size:12px;opacity:.85;margin-bottom:6px;}
  .budget-bar-track{background:rgba(255,255,255,.2);border-radius:99px;height:8px;overflow:hidden;}
  .budget-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sun),var(--coral-light));transition:width .5s ease;}

  .budget-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .budget-card{background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 12px rgba(0,0,0,.07);text-align:center;}
  .budget-card-label{font-size:11px;color:var(--text-light);margin-bottom:4px;font-weight:500;}
  .budget-card-value{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
  .budget-card-value.total{color:var(--ocean);}
  .budget-card-value.spent{color:var(--coral);}
  .budget-card-value.remain{color:var(--green);}

  .tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:8px 18px;border-radius:99px;border:2px solid var(--ocean);background:transparent;color:var(--ocean);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
  .tab.active{background:var(--ocean);color:white;}

  .category-section{margin-bottom:20px;}
  .category-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 14px;border-radius:12px;background:var(--sky);cursor:pointer;user-select:none;}
  .category-icon{font-size:20px;}
  .category-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--deep);font-weight:700;flex:1;}
  .category-toggle{color:var(--text-light);font-size:12px;transition:transform .2s;}
  .category-toggle.open{transform:rotate(90deg);}
  .activity-list{display:flex;flex-direction:column;gap:8px;}
  .activity-item{background:white;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:3px solid transparent;}
  .activity-item.done{border-left-color:var(--green);background:#f8fdf9;}
  .activity-item.done .activity-name{text-decoration:line-through;color:var(--text-light);}
  .activity-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--ocean-light);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:background .15s,border-color .15s;}
  .activity-check.checked{background:var(--green);border-color:var(--green);color:white;}
  .activity-info{flex:1;min-width:0;}
  .activity-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .activity-note{font-size:11px;color:var(--text-light);margin-top:2px;}
  .activity-cost{font-size:13px;font-weight:700;color:var(--coral);flex-shrink:0;min-width:55px;text-align:right;}
  .activity-cost.free{color:var(--green);}
  .act-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;background:var(--sky);color:var(--ocean);transition:background .15s;}
  .act-btn.del{color:var(--coral);}

  .add-activity-form{background:var(--sand);border-radius:16px;padding:16px;margin-top:10px;display:none;}
  .add-activity-form.visible{display:block;}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .form-group{flex:1;min-width:140px;}
  .form-group label{font-size:11px;font-weight:600;color:var(--text-light);display:block;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;}
  .form-group input,.form-group select{width:100%;padding:9px 12px;border:2px solid rgba(26,107,138,.15);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:white;outline:none;transition:border-color .15s;}
  .form-group input:focus,.form-group select:focus{border-color:var(--ocean);}
  .form-actions{display:flex;gap:10px;}
  .btn-save{flex:1;background:linear-gradient(135deg,var(--ocean),var(--ocean-light));color:white;border:none;border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
  .btn-cancel{padding:10px 16px;background:white;border:2px solid rgba(0,0,0,.1);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:var(--text-light);}
  .btn-danger{padding:10px 16px;background:#fde8e8;border:2px solid #f5c6c6;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;color:#c0392b;font-weight:600;}

  .expense-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
  .expense-item{background:white;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .expense-cat-badge{width:36px;height:36px;border-radius:10px;background:var(--sky);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .expense-info{flex:1;}
  .expense-name{font-size:14px;font-weight:500;}
  .expense-meta{font-size:11px;color:var(--text-light);margin-top:2px;}
  .expense-amount{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--coral);}
  .btn-del-exp{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-light);padding:4px;border-radius:6px;}
  .btn-del-exp:hover{color:var(--coral);}
  .add-expense-btn{display:flex;align-items:center;gap:8px;background:white;border:2px dashed var(--ocean-light);border-radius:14px;padding:14px 18px;color:var(--ocean);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:background .15s;}
  .add-expense-btn:hover{background:var(--sky);}

  .tips-box{background:linear-gradient(135deg,#fff8e1,#fff3cd);border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid rgba(245,200,66,.3);}
  .tips-title{font-family:'Playfair Display',serif;font-size:15px;color:#8b6914;margin-bottom:10px;}
  .tips-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .tip-tag{background:white;border-radius:20px;padding:5px 12px;font-size:12px;color:#7a5c10;border:1px solid rgba(245,200,66,.4);}

  .modal-overlay{position:fixed;inset:0;background:rgba(13,61,82,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.visible{opacity:1;pointer-events:all;}
  .modal{background:var(--white);border-radius:24px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;}
  .modal-overlay.visible .modal{transform:translateY(0);}
  .modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--deep);margin-bottom:20px;}
  .emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:10px 0;}
  .emoji-opt{font-size:24px;width:44px;height:44px;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--sky);transition:border-color .15s;}
  .emoji-opt.selected{border-color:var(--ocean);background:rgba(26,107,138,.1);}
  .color-grid{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
  .color-opt{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .15s;}
  .color-opt.selected{border-color:var(--text);}

  .fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--coral-light));color:white;border:none;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(232,107,74,.45);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s;}
  .fab:hover{transform:scale(1.08);}
  .fab.hidden{display:none;}

  .empty-state{text-align:center;padding:48px 20px;color:var(--text-light);}
  .empty-state-icon{font-size:56px;margin-bottom:16px;}
  .empty-state-text{font-family:'Playfair Display',serif;font-size:20px;color:var(--deep);margin-bottom:8px;}

  .loading-screen{position:fixed;inset:0;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
  .loading-screen.fade{opacity:0;pointer-events:none;}
  .loading-logo{font-family:'Playfair Display',serif;font-size:36px;color:var(--deep);margin-bottom:16px;}
  .loading-logo span{color:var(--coral);font-style:italic;}
  .loading-spinner{width:40px;height:40px;border:3px solid var(--sky);border-top-color:var(--ocean);border-radius:50%;animation:spin .8s linear infinite;}
  .loading-text{margin-top:16px;font-size:13px;color:var(--text-light);}
  @keyframes spin{to{transform:rotate(360deg);}}

  .params-box{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px;}
  .params-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--deep);margin-bottom:16px;}

  @media(max-width:480px){
    .budget-card-value{font-size:16px;}
    .trip-hero{padding:18px 16px;}
    .activity-name{font-size:13px;}
    .form-group{min-width:100%;}
  }
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">My<span>Voyage</span> ✈️</div>
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Connexion à Firebase…</div>
</div>

<div id="sync-bar"></div>
<div id="toast"></div>

<header>
  <div class="header-inner">
    <div class="logo">My<span>Voyage</span> ✈️</div>
    <div class="firebase-badge">
      <div class="firebase-dot" id="fb-dot"></div>
      <span id="fb-status">Connexion…</span>
    </div>
  </div>
  <div class="header-waves">🌊🌊🌊🌊🌊🌊🌊🌊🌊🌊🌊🌊</div>
</header>

<div class="app">

  <div class="view active" id="view-trips">
    <h2 class="section-title">Mes <em>voyages</em></h2>
    <div class="trips-grid" id="trips-grid"></div>
    <button class="btn-add-trip" onclick="openNewTripModal()">+ Ajouter un voyage</button>
  </div>

  <div class="view" id="view-detail">
    <button class="back-btn" onclick="showView('trips')">← Mes voyages</button>
    <div class="trip-hero" id="detail-hero" data-emoji="🏖️">
      <div class="trip-hero-name" id="detail-name"></div>
      <div class="trip-hero-dates" id="detail-dates"></div>
      <div class="budget-bar-label"><span>Budget consommé</span><span id="detail-pct">0%</span></div>
      <div class="budget-bar-track"><div class="budget-bar-fill" id="detail-bar" style="width:0%"></div></div>
    </div>
    <div class="budget-cards">
      <div class="budget-card"><div class="budget-card-label">Budget</div><div class="budget-card-value total" id="bc-budget">0 €</div></div>
      <div class="budget-card"><div class="budget-card-label">Dépensé</div><div class="budget-card-value spent" id="bc-spent">0 €</div></div>
      <div class="budget-card"><div class="budget-card-label">Reste</div><div class="budget-card-value remain" id="bc-remain">0 €</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('programme')">Programme</button>
      <button class="tab" onclick="switchTab('depenses')">Dépenses</button>
      <button class="tab" onclick="switchTab('conseils')">Conseils</button>
      <button class="tab" onclick="switchTab('parametres')">⚙️ Paramètres</button>
    </div>
    <div id="tab-programme">
      <div id="categories-container"></div>
      <button class="add-expense-btn" onclick="showAddCategoryForm()" style="margin-top:8px">+ Ajouter une catégorie</button>
      <div class="add-activity-form" id="cat-form" style="margin-top:10px">
        <div class="form-row">
          <div class="form-group"><label>Nom</label><input type="text" id="new-cat-name" placeholder="Ex: Restaurants"></div>
          <div class="form-group" style="min-width:80px;max-width:80px"><label>Icône</label><input type="text" id="new-cat-icon" placeholder="🍽️" maxlength="2"></div>
        </div>
        <div class="form-actions">
          <button class="btn-save" onclick="addCategory()">Ajouter</button>
          <button class="btn-cancel" onclick="hideCatForm()">Annuler</button>
        </div>
      </div>
    </div>
    <div id="tab-depenses" style="display:none">
      <div class="expense-list" id="expense-list"></div>
      <button class="add-expense-btn" onclick="openAddExpenseModal()">+ Enregistrer une dépense</button>
    </div>
    <div id="tab-conseils" style="display:none">
      <div class="tips-box" id="tips-box"></div>
    </div>
    <div id="tab-parametres" style="display:none">
      <div class="params-box">
        <div class="params-title">⚙️ Modifier le voyage</div>
        <div class="form-group" style="margin-bottom:12px"><label>Nom</label><input type="text" id="edit-trip-name"></div>
        <div class="form-row">
          <div class="form-group"><label>Date début</label><input type="date" id="edit-trip-start"></div>
          <div class="form-group"><label>Date fin</label><input type="date" id="edit-trip-end"></div>
        </div>
        <div class="form-group" style="margin-bottom:12px"><label>Budget (€)</label><input type="number" id="edit-trip-budget"></div>
        <div class="form-group" style="margin-bottom:16px"><label>Conseils (séparés par virgule)</label><input type="text" id="edit-trip-tips"></div>
        <div class="form-actions">
          <button class="btn-save" onclick="saveEditTrip()">💾 Enregistrer</button>
          <button class="btn-danger" onclick="deleteCurrentTrip()">🗑 Supprimer</button>
        </div>
      </div>
    </div>
  </div>

</div>

<button class="fab hidden" id="fab-add-activity" onclick="openAddActivityModal()">+</button>

<div class="modal-overlay" id="modal-trip">
  <div class="modal">
    <div class="modal-title">✈️ Nouveau voyage</div>
    <div class="form-group" style="margin-bottom:12px"><label>Nom du voyage</label><input type="text" id="trip-name-input" placeholder="Ex: Bretagne"></div>
    <div class="form-row">
      <div class="form-group"><label>Date début</label><input type="date" id="trip-start"></div>
      <div class="form-group"><label>Date fin</label><input type="date" id="trip-end"></div>
    </div>
    <div class="form-group" style="margin-bottom:14px"><label>Budget total (€)</label><input type="number" id="trip-budget" placeholder="2000"></div>
    <div class="form-group" style="margin-bottom:14px"><label>Emoji</label><div class="emoji-grid" id="emoji-grid"></div></div>
    <div class="form-group" style="margin-bottom:14px"><label>Couleur</label><div class="color-grid" id="color-grid"></div></div>
    <div class="form-group" style="margin-bottom:14px"><label>Conseils (séparés par virgule)</label><input type="text" id="trip-tips" placeholder="prévoir vélos, crème solaire..."></div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveTrip()">Créer</button>
      <button class="btn-cancel" onclick="closeModal('modal-trip')">Annuler</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-activity">
  <div class="modal">
    <div class="modal-title">🎯 Ajouter une idée</div>
    <div class="form-group" style="margin-bottom:12px"><label>Catégorie</label><select id="act-category"></select></div>
    <div class="form-group" style="margin-bottom:12px"><label>Nom de l'activité</label><input type="text" id="act-name" placeholder="Ex: Balade à vélo"></div>
    <div class="form-row">
      <div class="form-group"><label>Coût (€)</label><input type="number" id="act-cost" placeholder="0 = Gratuit"></div>
      <div class="form-group"><label>Note</label><input type="text" id="act-note" placeholder="Infos..."></div>
    </div>
    <div class="form-actions" style="margin-top:14px">
      <button class="btn-save" onclick="saveActivity()">Ajouter</button>
      <button class="btn-cancel" onclick="closeModal('modal-activity')">Annuler</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-expense">
  <div class="modal">
    <div class="modal-title">💸 Enregistrer une dépense</div>
    <div class="form-group" style="margin-bottom:12px"><label>Description</label><input type="text" id="exp-desc" placeholder="Ex: Restaurant Le Port"></div>
    <div class="form-row">
      <div class="form-group"><label>Montant (€)</label><input type="number" id="exp-amount" placeholder="0.00"></div>
      <div class="form-group"><label>Date</label><input type="date" id="exp-date"></div>
    </div>
    <div class="form-group" style="margin-bottom:12px"><label>Catégorie</label>
      <select id="exp-cat">
        <option value="🍽️">🍽️ Restauration</option>
        <option value="🎡">🎡 Activité / Visite</option>
        <option value="🏨">🏨 Hébergement</option>
        <option value="⛽">⛽ Transport / Carburant</option>
        <option value="🛒">🛒 Courses / Marché</option>
        <option value="🍦">🍦 Loisirs / Plaisir</option>
        <option value="💊">💊 Santé / Pharmacie</option>
        <option value="🎁">🎁 Souvenirs</option>
        <option value="📦">📦 Autre</option>
      </select>
    </div>
    <div class="form-actions" style="margin-top:14px">
      <button class="btn-save" onclick="saveExpense()">Enregistrer</button>
      <button class="btn-cancel" onclick="closeModal('modal-expense')">Annuler</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyAadATjfHGpFDLPCOADzt4pHNzsvwOgdvw",
  authDomain: "myvoyage-a4802.firebaseapp.com",
  databaseURL: "https://myvoyage-a4802-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "myvoyage-a4802",
  storageBucket: "myvoyage-a4802.firebasestorage.app",
  messagingSenderId: "712172725634",
  appId: "1:712172725634:web:21ca145b5e0dcbabbcdb9b"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── CONSTANTS ──
const EMOJIS = ['🏖️','⛵','🚲','🏰','🌿','🏔️','🌍','🗺️','🎡','🌅','🏕️','🎣','🚢','✈️','🧳','🗼','🌴','🏄','🎿','🍷'];
const COLORS = ['#1a6b8a','#e86b4a','#4a9b6f','#7b5ea7','#e07800','#c0392b','#2980b9','#16a085'];

// ── STATE ──
let selEmoji = '🏖️', selColor = '#1a6b8a';
let currentTripId = null, currentTab = 'programme';
let appData = { trips: {} };

// ── UTILS ──
function uid() { return 'id' + Date.now() + Math.random().toString(36).slice(2,6); }
function fmtDate(s) { if(!s) return ''; const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y; }
function lighten(h) { try{const n=parseInt(h.slice(1),16);return `rgb(${Math.min(255,(n>>16)+60)},${Math.min(255,((n>>8)&255)+60)},${Math.min(255,(n&255)+60)})`;}catch(e){return h;} }
function darken(h) { try{const n=parseInt(h.slice(1),16);return `rgb(${Math.max(0,(n>>16)-40)},${Math.max(0,((n>>8)&255)-40)},${Math.max(0,(n&255)-40)})`;}catch(e){return h;} }

function toast(msg, ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), ms);
}
function syncBar(on) {
  const b = document.getElementById('sync-bar');
  b.className = on ? 'syncing' : 'done';
  if (!on) setTimeout(() => b.className='', 700);
}
function setOnline(ok) {
  document.getElementById('fb-dot').className = 'firebase-dot' + (ok ? '' : ' offline');
  document.getElementById('fb-status').textContent = ok ? 'Synchronisé 🔥' : 'Hors ligne';
}

// ── FIREBASE WRITE ──
async function fbSet(path, data) {
  syncBar(true);
  try { await set(ref(db, path), data); setOnline(true); }
  catch(e) { toast('❌ Erreur Firebase'); setOnline(false); console.error(e); }
  finally { syncBar(false); }
}
async function fbDel(path) {
  syncBar(true);
  try { await remove(ref(db, path)); setOnline(true); }
  catch(e) { toast('❌ Erreur Firebase'); setOnline(false); }
  finally { syncBar(false); }
}

function getTrip(id) { return (appData.trips || {})[id] || null; }
function calcSpent(trip) { return Object.values(trip.expenses || {}).reduce((s,e) => s + parseFloat(e.amount||0), 0); }

// ── VIEWS ──
window.showView = function(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('fab-add-activity').classList.toggle('hidden', name !== 'detail');
  if (name === 'trips') renderTrips();
};

// ── TRIPS ──
function renderTrips() {
  const grid = document.getElementById('trips-grid');
  const trips = Object.values(appData.trips || {});
  if (!trips.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">✈️</div><div class="empty-state-text">Aucun voyage encore</div><p style="font-size:14px;color:var(--text-light)">Créez votre premier voyage !</p></div>';
    return;
  }
  grid.innerHTML = trips.map(trip => {
    const spent = calcSpent(trip);
    const rem = (trip.budget||0) - spent;
    return '<div class="trip-card" onclick="openTrip(\''+trip.id+'\')">'
      + '<div class="trip-card-banner" style="background:linear-gradient(135deg,'+( trip.color||'#1a6b8a')+','+lighten(trip.color||'#1a6b8a')+')">'
      + '<span style="font-size:48px">'+(trip.emoji||'🏖️')+'</span></div>'
      + '<div class="trip-card-body">'
      + '<div class="trip-card-name">'+trip.name+'</div>'
      + '<div class="trip-card-dates">📅 '+fmtDate(trip.start)+' – '+fmtDate(trip.end)+'</div>'
      + '<div class="trip-card-stats">'
      + '<span class="stat-pill">💰 '+(trip.budget||0)+' €</span>'
      + '<span class="stat-pill '+(rem>=0?'ok':'over')+'">'+(rem>=0?'✅':'⚠️')+' '+rem.toFixed(0)+' € restants</span>'
      + '</div></div></div>';
  }).join('');
}

window.openTrip = function(id) {
  currentTripId = id;
  const trip = getTrip(id); if (!trip) return;
  const hero = document.getElementById('detail-hero');
  hero.setAttribute('data-emoji', trip.emoji||'🏖️');
  hero.style.background = 'linear-gradient(135deg,'+darken(trip.color||'#1a6b8a')+',+'+(trip.color||'#1a6b8a')+')';
  document.getElementById('detail-name').textContent = trip.name;
  document.getElementById('detail-dates').textContent = '📅 '+fmtDate(trip.start)+' → '+fmtDate(trip.end);
  updateBudget(trip);
  switchTab('programme');
  showView('detail');
};

function updateBudget(trip) {
  const spent = calcSpent(trip), budget = parseFloat(trip.budget||0), rem = budget - spent;
  const pct = budget ? Math.min(100, Math.round(spent/budget*100)) : 0;
  document.getElementById('bc-budget').textContent = budget.toFixed(0)+' €';
  document.getElementById('bc-spent').textContent = spent.toFixed(2)+' €';
  document.getElementById('bc-remain').textContent = rem.toFixed(2)+' €';
  document.getElementById('bc-remain').style.color = rem >= 0 ? 'var(--green)' : 'var(--coral)';
  document.getElementById('detail-pct').textContent = pct+'%';
  document.getElementById('detail-bar').style.width = pct+'%';
}

// ── TABS ──
window.switchTab = function(tab) {
  currentTab = tab;
  ['programme','depenses','conseils','parametres'].forEach((n,i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', n===tab);
    document.getElementById('tab-'+n).style.display = n===tab ? '' : 'none';
  });
  document.getElementById('fab-add-activity').classList.toggle('hidden', tab !== 'programme');
  if (tab==='programme') renderCategories();
  if (tab==='depenses') renderExpenses();
  if (tab==='conseils') renderTips();
  if (tab==='parametres') loadEditForm();
};

// ── CATEGORIES ──
function renderCategories() {
  const trip = getTrip(currentTripId);
  const container = document.getElementById('categories-container');
  if (!trip) return;
  const cats = Object.values(trip.categories || {});
  if (!cats.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Pas encore d\'idées</div></div>';
    return;
  }
  container.innerHTML = cats.map(cat => {
    const acts = Object.values(cat.activities || {});
    const isOpen = cat.open !== false;
    return '<div class="category-section">'
      + '<div class="category-header" onclick="toggleCat(\''+cat.id+'\')">'
      + '<span class="category-icon">'+(cat.icon||'📌')+'</span>'
      + '<span class="category-name">'+cat.name+'</span>'
      + '<span class="category-toggle '+(isOpen?'open':'')+'">▶</span>'
      + '</div>'
      + '<div id="cb-'+cat.id+'" style="'+(isOpen?'':'display:none')+'">'
      + '<div class="activity-list">'
      + acts.map(act =>
          '<div class="activity-item '+(act.done?'done':'')+'">'
          + '<button class="activity-check '+(act.done?'checked':'')+'" onclick="toggleAct(\''+cat.id+'\',\''+act.id+'\')">'+(act.done?'✓':'')+'</button>'
          + '<div class="activity-info">'
          + '<div class="activity-name">'+act.name+'</div>'
          + (act.note ? '<div class="activity-note">'+act.note+'</div>' : '')
          + '</div>'
          + '<div class="activity-cost '+(act.cost==0?'free':'')+'">'+(act.cost==0?'Gratuit':act.cost+' €')+'</div>'
          + '<button class="act-btn del" onclick="delAct(\''+cat.id+'\',\''+act.id+'\')">🗑</button>'
          + '</div>'
        ).join('')
      + '</div>'
      + '<button class="add-expense-btn" style="margin-top:8px;font-size:13px;padding:10px 14px" onclick="openAddActivityModal(\''+cat.id+'\')">+ Ajouter dans '+cat.name+'</button>'
      + '</div></div>';
  }).join('');
}

window.toggleCat = async function(catId) {
  const trip = getTrip(currentTripId);
  const cat = trip.categories[catId];
  cat.open = (cat.open === false);
  await fbSet('trips/'+currentTripId+'/categories/'+catId+'/open', cat.open);
  const body = document.getElementById('cb-'+catId);
  if (body) {
    body.style.display = cat.open ? '' : 'none';
    const tog = body.previousElementSibling.querySelector('.category-toggle');
    if (tog) tog.classList.toggle('open', cat.open);
  }
};

window.toggleAct = async function(catId, actId) {
  const trip = getTrip(currentTripId);
  const act = trip.categories[catId].activities[actId];
  act.done = !act.done;
  await fbSet('trips/'+currentTripId+'/categories/'+catId+'/activities/'+actId+'/done', act.done);
  renderCategories();
  toast(act.done ? '✅ Activité cochée !' : '↩️ Décochée');
};

window.delAct = async function(catId, actId) {
  if (!confirm('Supprimer cette activité ?')) return;
  await fbDel('trips/'+currentTripId+'/categories/'+catId+'/activities/'+actId);
  toast('🗑 Supprimé');
};

window.showAddCategoryForm = function() { document.getElementById('cat-form').classList.add('visible'); };
window.hideCatForm = function() { document.getElementById('cat-form').classList.remove('visible'); };

window.addCategory = async function() {
  const name = document.getElementById('new-cat-name').value.trim();
  const icon = document.getElementById('new-cat-icon').value.trim() || '📌';
  if (!name) return;
  const id = uid();
  await fbSet('trips/'+currentTripId+'/categories/'+id, { id, name, icon, open:true, activities:{} });
  document.getElementById('new-cat-name').value = '';
  document.getElementById('new-cat-icon').value = '';
  hideCatForm();
  toast('📌 Catégorie ajoutée !');
};

// ── ACTIVITY MODAL ──
window.openAddActivityModal = function(forceCatId) {
  const trip = getTrip(currentTripId);
  document.getElementById('act-category').innerHTML = Object.values(trip.categories||{})
    .map(c => '<option value="'+c.id+'" '+(c.id===forceCatId?'selected':'')+'>'+c.icon+' '+c.name+'</option>').join('');
  document.getElementById('act-name').value = '';
  document.getElementById('act-cost').value = '';
  document.getElementById('act-note').value = '';
  openModal('modal-activity');
};

window.saveActivity = async function() {
  const catId = document.getElementById('act-category').value;
  const name = document.getElementById('act-name').value.trim();
  const cost = parseFloat(document.getElementById('act-cost').value) || 0;
  const note = document.getElementById('act-note').value.trim();
  if (!name) return;
  const id = uid();
  await fbSet('trips/'+currentTripId+'/categories/'+catId+'/activities/'+id, { id, name, cost, note, done:false });
  closeModal('modal-activity');
  toast('🎯 Idée ajoutée !');
};

// ── EXPENSES ──
function renderExpenses() {
  const trip = getTrip(currentTripId);
  const list = document.getElementById('expense-list');
  const exps = Object.values(trip.expenses || {});
  if (!exps.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💳</div><div class="empty-state-text">Aucune dépense</div></div>';
    return;
  }
  list.innerHTML = exps.sort((a,b) => (b.date||'').localeCompare(a.date||'')).map(exp =>
    '<div class="expense-item">'
    + '<div class="expense-cat-badge">'+(exp.cat||'📦')+'</div>'
    + '<div class="expense-info"><div class="expense-name">'+exp.desc+'</div><div class="expense-meta">'+(exp.date?fmtDate(exp.date):'')+'</div></div>'
    + '<div class="expense-amount">'+parseFloat(exp.amount).toFixed(2)+' €</div>'
    + '<button class="btn-del-exp" onclick="delExp(\''+exp.id+'\')">✕</button>'
    + '</div>'
  ).join('');
}

window.openAddExpenseModal = function() {
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-date').value = new Date().toISOString().slice(0,10);
  openModal('modal-expense');
};

window.saveExpense = async function() {
  const desc = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const date = document.getElementById('exp-date').value;
  const cat = document.getElementById('exp-cat').value;
  if (!desc || isNaN(amount)) return;
  const id = uid();
  await fbSet('trips/'+currentTripId+'/expenses/'+id, { id, desc, amount, date, cat });
  closeModal('modal-expense');
  updateBudget(getTrip(currentTripId));
  toast('💸 Dépense enregistrée !');
};

window.delExp = async function(id) {
  if (!confirm('Supprimer cette dépense ?')) return;
  await fbDel('trips/'+currentTripId+'/expenses/'+id);
  updateBudget(getTrip(currentTripId));
  toast('🗑 Dépense supprimée');
};

// ── TIPS ──
function renderTips() {
  const trip = getTrip(currentTripId);
  const tips = trip.tips || [];
  document.getElementById('tips-box').innerHTML =
    '<div class="tips-title">☀️ Conseils pour ce voyage</div>'
    + '<div class="tips-grid">'+tips.map(t => '<span class="tip-tag">✔ '+t+'</span>').join('')+'</div>'
    + (!tips.length ? '<p style="color:#8b6914;font-size:13px">Aucun conseil.</p>' : '')
    + '<div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(245,200,66,.3)">'
    + '<p style="font-size:13px;color:#7a5c10;font-style:italic;font-family:\'Playfair Display\',serif">✨ Une magnifique aventure en famille vous attend ! ✨</p>'
    + '</div>';
}

// ── EDIT TRIP ──
function loadEditForm() {
  const trip = getTrip(currentTripId); if (!trip) return;
  document.getElementById('edit-trip-name').value = trip.name || '';
  document.getElementById('edit-trip-start').value = trip.start || '';
  document.getElementById('edit-trip-end').value = trip.end || '';
  document.getElementById('edit-trip-budget').value = trip.budget || '';
  document.getElementById('edit-trip-tips').value = (trip.tips||[]).join(', ');
}

window.saveEditTrip = async function() {
  const trip = getTrip(currentTripId);
  const name = document.getElementById('edit-trip-name').value.trim();
  const start = document.getElementById('edit-trip-start').value;
  const end = document.getElementById('edit-trip-end').value;
  const budget = parseFloat(document.getElementById('edit-trip-budget').value) || 0;
  const tips = document.getElementById('edit-trip-tips').value.split(',').map(t=>t.trim()).filter(Boolean);
  await fbSet('trips/'+currentTripId, { ...trip, name, start, end, budget, tips });
  document.getElementById('detail-name').textContent = name;
  document.getElementById('detail-dates').textContent = '📅 '+fmtDate(start)+' → '+fmtDate(end);
  document.getElementById('bc-budget').textContent = budget.toFixed(0)+' €';
  toast('✅ Voyage mis à jour !');
};

window.deleteCurrentTrip = async function() {
  const trip = getTrip(currentTripId);
  if (!confirm('Supprimer "'+trip.name+'" définitivement ?')) return;
  await fbDel('trips/'+currentTripId);
  toast('🗑 Voyage supprimé');
  showView('trips');
};

// ── NEW TRIP MODAL ──
window.openNewTripModal = function() {
  selEmoji = '🏖️'; selColor = '#1a6b8a';
  ['trip-name-input','trip-start','trip-end','trip-budget','trip-tips'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    '<div class="emoji-opt '+(e===selEmoji?'selected':'')+'" onclick="pickEmoji(\''+e+'\')">'+e+'</div>').join('');
  document.getElementById('color-grid').innerHTML = COLORS.map(c =>
    '<div class="color-opt '+(c===selColor?'selected':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\')"></div>').join('');
  openModal('modal-trip');
};

window.pickEmoji = function(e) {
  selEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent===e));
};
window.pickColor = function(c) {
  selColor = c;
  document.querySelectorAll('.color-opt').forEach(el => el.classList.toggle('selected', el.style.background===c || el.style.backgroundColor===c));
};

window.saveTrip = async function() {
  const name = document.getElementById('trip-name-input').value.trim();
  const start = document.getElementById('trip-start').value;
  const end = document.getElementById('trip-end').value;
  const budget = parseFloat(document.getElementById('trip-budget').value) || 0;
  const tips = document.getElementById('trip-tips').value.split(',').map(t=>t.trim()).filter(Boolean);
  if (!name) { alert('Indiquez un nom pour le voyage.'); return; }
  const id = uid();
  await fbSet('trips/'+id, { id, name, start, end, budget, emoji:selEmoji, color:selColor, tips, categories:{}, expenses:{} });
  closeModal('modal-trip');
  toast('🎉 Voyage créé !');
};

// ── MODALS ──
window.openModal = function(id) { document.getElementById(id).classList.add('visible'); };
window.closeModal = function(id) { document.getElementById(id).classList.remove('visible'); };
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('visible'); }));

// INIT — ÉCOUTE TEMPS RÉEL FIREBASE
// ════════════════════════════════
let initialized = false;

onValue(ref(db,'trips'), async (snapshot) => {
  const data = snapshot.val();

  // Premier lancement : pousser les données par défaut
  if (!data) {
    document.getElementById('loading-text').textContent = 'Initialisation des données…';
    await fbSet('trips/charente-2026', DEFAULT);
    return;
  }

  appData.trips = data;
  setOnline(true);

  // Rafraîchir la vue active
  const activeView = document.querySelector('.view.active')?.id;
  if (activeView === 'view-trips') renderTrips();
  if (activeView === 'view-detail' && currentTripId) {
    const trip = getTrip(currentTripId);
    if (trip) {
      updateBudget(trip);
      if (currentTab==='programme') renderCategories();
      if (currentTab==='depenses') renderExpenses();
    }
  }

  // Masquer l'écran de chargement au premier rendu
  if (!initialized) {
    initialized = true;
    const ls = document.getElementById('loading-screen');
    if (ls) { ls.classList.add('fade'); setTimeout(() => ls.remove(), 600); }
  }

}, (err) => {
  console.error(err);
  setOnline(false);
  document.getElementById('loading-text').textContent = '❌ Impossible de se connecter';
  toast('❌ Erreur de connexion Firebase', 5000);
});
</script>
